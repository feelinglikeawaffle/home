<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Menu</title>
<style>
    body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 32px;
        letter-spacing: 1px;
    }

    .menu {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 400px;
        margin: auto;
    }

    .game-btn {
        padding: 15px;
        background: #222;
        border: 2px solid #444;
        border-radius: 8px;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    .game-btn:hover {
        background: #444;
        border-color: #888;
    }
</style>
</head>
<body>

<h1>feelinglikeawaffle 2026</h1>

<div class="menu" id="menu">
    <!-- ADD YOUR LINKS HERE -->
    <button class="game-btn" onclick="openGame('https://feelinglikeawaffle.github.io/pong/')">Pong Deckbuilder</button>
    <button class="game-btn" onclick="openGame('https://feelinglikeawaffle.github.io/minesweeper/')">Minesweeper Deckbuilder</button>
</div>

<script>
function openGame(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
