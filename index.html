<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Menu</title>
<style>
    body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 32px;
        letter-spacing: 1px;
    }

    .menu {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 400px;
        margin: auto;
    }

    .game-btn {
        padding: 15px;
        background: #222;
        border: 2px solid #444;
        border-radius: 8px;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
        position: relative;
    }

    .game-btn:hover {
        background: #444;
        border-color: #888;
    }

    /* TAG STYLES */
    .tag {
        display: inline-block;
        padding: 3px 8px;
        margin-left: 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: bold;
    }

    .tag-release { background: #2ecc71; color: #000; }        /* green */
    .tag-beta { background: #3498db; color: #000; }           /* blue */
    .tag-dev { background: #f1c40f; color: #000; }            /* yellow */
    .tag-playtest { background: #9b59b6; color: #fff; }       /* purple */
    .tag-deprecated { background: #e74c3c; color: #fff; }     /* red */

    /* POPULAR BADGE */
    .popular {
        overflow: visible;
    }

    .popular::after {
        content: "POPULAR";
        position: absolute;
        top: -10px;
        right: -10px;
        background: linear-gradient(45deg, #ff0066, #ffcc00);
        color: #000;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: bold;
        border-radius: 6px;
        box-shadow: 0 0 10px #ff0088;
        animation: popPulse 1.5s infinite ease-in-out;
    }

    @keyframes popPulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.85; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>
</head>
<body>

<h1>feelinglikeawaffle©</h1>

<div class="menu" id="menu">
    <!-- ADD YOUR LINKS HERE -->

    <button class="game-btn" onclick="openGame('https://feelinglikeawaffle.github.io/pong/')">
        Pong Deckbuilder <span class="tag tag-beta">BETA</span>
    </button>

    <button class="game-btn popular" onclick="openGame('https://feelinglikeawaffle.github.io/void/')">
        (Online) Void Feeder <span class="tag tag-dev">IN DEVELOPMENT</span>
    </button>

    <button class="game-btn" onclick="openGame('https://feelinglikeawaffle.github.io/minesweeper/')">
        Minesweeper Deckbuilder <span class="tag tag-release">RELEASE</span>
    </button>

    <button class="game-btn" onclick="openGame('https://feelinglikeawaffle.github.io/numbergame/')">
        Infinite Math (broken) <span class="tag tag-deprecated">DEPRECIATED</span>
    </button>
</div>

<script>
function openGame(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
